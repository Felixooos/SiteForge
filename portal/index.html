<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 SiteForge Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: white;
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 1.2rem;
      margin-bottom: 50px;
    }
    .admin-banner {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 15px 25px;
      border-radius: 15px;
      color: white;
      text-align: center;
      margin-bottom: 30px;
      display: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .admin-banner.show { display: block; }
    .admin-banner a {
      color: white;
      text-decoration: underline;
      font-weight: 600;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .site-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }
    .site-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .site-preview {
      height: 200px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }
    .site-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .site-info {
      padding: 20px;
    }
    .site-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }
    .site-description {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 15px;
    }
    .site-actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      flex: 1;
      text-align: center;
    }
    .btn-view {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-view:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-edit {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      display: none;
    }
    .admin .btn-edit { display: block; }
    .btn-edit:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
    }
    .add-site {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      border: 3px dashed rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 20px;
      min-height: 350px;
      text-decoration: none;
    }
    .add-site:hover {
      border-color: rgba(0,0,0,0.4);
      color: rgba(0,0,0,0.5);
      transform: scale(1.02);
    }
    .loading {
      text-align: center;
      color: white;
      font-size: 1.2rem;
      padding: 50px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 SiteForge Portal</h1>
    <p class="subtitle">Tous vos sites en un seul endroit</p>
    
    <div class="admin-banner" id="adminBanner">
      👑 Mode Admin activé - <a href="/admin/">Accéder à l'éditeur</a>
    </div>

    <div class="sites-grid" id="sitesGrid">
      <div class="loading">⏳ Chargement des sites...</div>
    </div>
  </div>

  <script>
    const isAdmin = localStorage.getItem('siteforge_admin') === 'true';
    
    if (isAdmin) {
      document.body.classList.add('admin');
      document.getElementById('adminBanner').classList.add('show');
    }

    async function loadSites() {
      try {
        const res = await fetch('/api/projects');
        const projects = await res.json();
        
        const grid = document.getElementById('sitesGrid');
        grid.innerHTML = '';

        projects.forEach(project => {
          const card = document.createElement('div');
          card.className = 'site-card';
          card.innerHTML = `
            <div class="site-preview">
              ${project.logo ? `<img src="${project.logo}" alt="${project.name}">` : '🌐'}
            </div>
            <div class="site-info">
              <div class="site-name">${project.name || project.id}</div>
              <div class="site-description">${project.description || 'Aucune description'}</div>
              <div class="site-actions">
                <a href="/${project.id}/" class="btn btn-view">👁️ Voir</a>
                <a href="/admin/?project=${project.id}" class="btn btn-edit">✏️ Éditer</a>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        if (isAdmin) {
          const addCard = document.createElement('a');
          addCard.href = '/admin/';
          addCard.className = 'add-site';
          addCard.innerHTML = '➕';
          addCard.title = 'Créer un nouveau site';
          grid.appendChild(addCard);
        }

        if (projects.length === 0) {
          grid.innerHTML = '<div class="loading">Aucun site pour le moment. <a href="/admin/" style="color: white; text-decoration: underline;">Créez-en un !</a></div>';
        }
      } catch (err) {
        console.error('Erreur chargement:', err);
        document.getElementById('sitesGrid').innerHTML = '<div class="loading">❌ Erreur de chargement</div>';
      }
    }

    loadSites();

    // Activer le mode admin avec Ctrl+Alt+A
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.altKey && e.key === 'a') {
        const newState = !isAdmin;
        localStorage.setItem('siteforge_admin', newState);
        location.reload();
      }
    });
  </script>
</body>
</html>
